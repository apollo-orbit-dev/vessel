<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- A document with a folded corner. The lower portion is filled like the
       Vessel mark's "container with data inside" — so a .vessel reads as a
       document that carries its data. -->
  <path d="M16 9 H37 L48 20 V55 H16 Z" fill="#ffffff" stroke="#5b86b0" stroke-width="2.6" stroke-linejoin="round"/>
  <path d="M16 38 H48 V55 H16 Z" fill="#5b86b0" fill-opacity="0.16"/>
  <line x1="16" y1="38" x2="48" y2="38" stroke="#5b86b0" stroke-width="2.6"/>
  <path d="M37 9 V20 H48 Z" fill="#5b86b0" fill-opacity="0.30" stroke="#5b86b0" stroke-width="2.2" stroke-linejoin="round"/>
</svg>
