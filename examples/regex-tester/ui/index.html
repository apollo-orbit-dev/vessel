<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Regex Tester</title>
    <!-- Layout only — every colour comes from the Vessel theme (--vessel-*
         tokens + base component styles the host injects). Toggle light/dark or
         the theme in the host and this UI follows. Match/group highlights are
         accent-tinted via color-mix. NO hardcoded colours. -->
    <style>
      html, body { height: 100%; }
      body {
        margin: 0; padding: 0;
        background: var(--vessel-bg); color: var(--vessel-text);
        font: 14px var(--vessel-font);
      }
      .app { display: flex; flex-direction: column; height: 100vh; min-height: 0; }

      .head {
        display: flex; align-items: center; gap: 12px;
        padding: 13px 26px;
        background: var(--vessel-surface);
        border-bottom: 1px solid var(--vessel-border);
        flex: 0 0 auto;
      }
      .head h1 {
        margin: 0; font: 600 16px var(--vessel-font);
        letter-spacing: -0.01em; color: var(--vessel-text);
      }
      .head .sub {
        font: 11.5px var(--vessel-font-mono); color: var(--vessel-text-muted);
      }
      .spacer { flex: 1; }

      .body {
        flex: 1; min-height: 0; display: grid;
        grid-template-columns: 1fr 320px; gap: 0;
      }
      .main {
        min-width: 0; min-height: 0; overflow-y: auto;
        padding: 20px 26px; display: flex; flex-direction: column; gap: 16px;
      }
      .side {
        min-height: 0; overflow-y: auto;
        border-left: 1px solid var(--vessel-border);
        background: var(--vessel-surface);
        padding: 18px 18px;
      }

      label.block { display: block; }
      label.block > span {
        display: block; margin-bottom: 6px;
        font: 11px var(--vessel-font); color: var(--vessel-text-muted);
        letter-spacing: 0.01em;
      }

      .pattern-row { display: flex; align-items: stretch; gap: 8px; }
      .delim {
        display: inline-flex; align-items: center; padding: 0 4px;
        font: 16px var(--vessel-font-mono); color: var(--vessel-text-muted);
      }
      #pattern {
        flex: 1; min-width: 0;
        font-family: var(--vessel-font-mono); font-size: 14px;
        padding: 9px 11px; box-sizing: border-box;
        border-radius: var(--vessel-radius);
        border: 1px solid var(--vessel-border);
        background: var(--vessel-field); color: var(--vessel-text);
        outline: none;
      }
      #pattern.invalid { border-color: var(--vessel-danger); }

      .flags { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 10px; }
      .flag {
        display: inline-flex; align-items: center; gap: 7px;
        padding: 6px 10px; border-radius: var(--vessel-radius);
        border: 1px solid var(--vessel-border);
        background: var(--vessel-field); color: var(--vessel-text-muted);
        font: 12px var(--vessel-font); cursor: pointer; user-select: none;
      }
      .flag input { margin: 0; }
      .flag .ltr { font-family: var(--vessel-font-mono); font-weight: 600; }
      .flag.on {
        border-color: transparent;
        background: color-mix(in srgb, var(--vessel-accent) 16%, var(--vessel-field));
        color: var(--vessel-text);
      }

      textarea#sample {
        width: 100%; box-sizing: border-box; min-height: 150px; resize: vertical;
        font-family: var(--vessel-font-mono); font-size: 13px; line-height: 1.6;
        padding: 11px 13px; border-radius: var(--vessel-radius);
        border: 1px solid var(--vessel-border);
        background: var(--vessel-field); color: var(--vessel-text); outline: none;
      }

      .error {
        font: 12.5px var(--vessel-font-mono); color: var(--vessel-danger);
        background: color-mix(in srgb, var(--vessel-danger) 10%, transparent);
        border: 1px solid color-mix(in srgb, var(--vessel-danger) 35%, transparent);
        border-radius: var(--vessel-radius); padding: 9px 12px;
      }

      .result-head {
        display: flex; align-items: center; gap: 10px;
        font: 12px var(--vessel-font-mono); color: var(--vessel-text-muted);
      }
      .result-head b { color: var(--vessel-text); font-weight: 600; }

      /* highlighted sample render — preserves whitespace, mono font */
      .render {
        font-family: var(--vessel-font-mono); font-size: 13px; line-height: 1.7;
        white-space: pre-wrap; word-break: break-word;
        padding: 13px 15px; border-radius: var(--vessel-radius);
        border: 1px solid var(--vessel-border); background: var(--vessel-field);
        color: var(--vessel-text); min-height: 40px;
      }
      .render mark {
        background: color-mix(in srgb, var(--vessel-accent) 26%, transparent);
        color: var(--vessel-text); border-radius: 3px;
        padding: 1px 0; box-decoration-break: clone;
        -webkit-box-decoration-break: clone;
      }
      /* a nested capture group inside a match gets a stronger tint + underline */
      .render mark .grp {
        background: color-mix(in srgb, var(--vessel-accent) 38%, transparent);
        border-radius: 2px;
        box-shadow: 0 1px 0 0 var(--vessel-accent);
      }
      /* zero-width match caret */
      .render .caret {
        display: inline-block; width: 0; border-left: 2px solid var(--vessel-accent);
        margin: 0 -1px; height: 1.1em; vertical-align: text-bottom;
      }

      .matches { display: flex; flex-direction: column; gap: 8px; }
      .match-card {
        border: 1px solid var(--vessel-border); border-radius: var(--vessel-radius);
        background: var(--vessel-surface); padding: 10px 12px;
      }
      .match-card .mline {
        display: flex; align-items: baseline; gap: 8px;
        font: 12px var(--vessel-font-mono); color: var(--vessel-text-muted);
      }
      .match-card .mval {
        color: var(--vessel-text); font-weight: 600;
        word-break: break-all; flex: 1; min-width: 0;
      }
      .match-card .span { flex: 0 0 auto; }
      .groups { margin: 7px 0 0; padding: 0; list-style: none;
        display: flex; flex-direction: column; gap: 4px; }
      .groups li {
        display: flex; gap: 8px; align-items: baseline;
        font: 11.5px var(--vessel-font-mono); color: var(--vessel-text-muted);
      }
      .groups .gname { color: var(--vessel-accent); flex: 0 0 auto; }
      .groups .gval { color: var(--vessel-text); word-break: break-all; }
      .groups .gnull { font-style: italic; }

      .hint { font: 12px var(--vessel-font); color: var(--vessel-text-muted); }

      /* ---- pattern library (right rail) ---- */
      .side h2 {
        margin: 0 0 4px; font: 600 13px var(--vessel-font);
        color: var(--vessel-text); letter-spacing: -0.005em;
      }
      .side .libhint { margin: 0 0 14px; font: 11.5px var(--vessel-font); color: var(--vessel-text-muted); }
      .lib { display: flex; flex-direction: column; gap: 8px; }
      .lib-item {
        border: 1px solid var(--vessel-border); border-radius: var(--vessel-radius);
        background: var(--vessel-bg); padding: 9px 10px;
      }
      .lib-item .li-top { display: flex; align-items: baseline; gap: 6px; }
      .lib-item .li-name {
        font: 600 12.5px var(--vessel-font); color: var(--vessel-text);
        flex: 1; min-width: 0; word-break: break-word;
      }
      .lib-item .li-flags {
        font: 11px var(--vessel-font-mono); color: var(--vessel-text-muted); flex: 0 0 auto;
      }
      .lib-item .li-pat {
        margin-top: 4px; font: 11.5px var(--vessel-font-mono);
        color: var(--vessel-text-muted); word-break: break-all;
        max-height: 3.2em; overflow: hidden;
      }
      .lib-item .li-note {
        margin-top: 5px; font: 11px var(--vessel-font); color: var(--vessel-text-muted);
        line-height: 1.5;
      }
      .lib-item .li-acts { display: flex; gap: 6px; margin-top: 8px; }
      .lib-item .li-acts button {
        font: 11px var(--vessel-font); padding: 4px 9px; cursor: pointer;
      }
      .save-form { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
      .save-form input, .save-form textarea {
        width: 100%; box-sizing: border-box; padding: 7px 9px;
        font: 12.5px var(--vessel-font);
        border-radius: var(--vessel-radius); border: 1px solid var(--vessel-border);
        background: var(--vessel-field); color: var(--vessel-text); outline: none;
      }
      .save-form textarea { resize: vertical; min-height: 40px; line-height: 1.5; }
      .save-form .sf-row { display: flex; gap: 8px; align-items: center; }
      .save-form .sf-row .editing {
        font: 11px var(--vessel-font-mono); color: var(--vessel-text-muted);
      }
      .save-form .sf-err { font: 11.5px var(--vessel-font); color: var(--vessel-danger); min-height: 0; }
      .empty { font: 12px var(--vessel-font); color: var(--vessel-text-muted); padding: 8px 0; }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="head">
        <h1>Regex Tester</h1>
        <span class="sub">Python <code>re</code> engine</span>
        <div class="spacer"></div>
        <span class="sub" id="status">—</span>
      </header>

      <div class="body">
        <section class="main">
          <label class="block">
            <span>Pattern</span>
            <div class="pattern-row">
              <span class="delim">/</span>
              <input id="pattern" type="text" spellcheck="false" autocomplete="off"
                     placeholder="\b\w+@\w+\.\w+\b" maxlength="2000" />
              <span class="delim" id="flag-suffix">/</span>
            </div>
            <div class="flags" id="flags">
              <label class="flag"><input type="checkbox" data-flag="i" /><span class="ltr">i</span><span>IGNORECASE</span></label>
              <label class="flag"><input type="checkbox" data-flag="m" /><span class="ltr">m</span><span>MULTILINE</span></label>
              <label class="flag"><input type="checkbox" data-flag="s" /><span class="ltr">s</span><span>DOTALL</span></label>
              <label class="flag"><input type="checkbox" data-flag="x" /><span class="ltr">x</span><span>VERBOSE</span></label>
            </div>
          </label>

          <label class="block">
            <span>Sample text</span>
            <textarea id="sample" spellcheck="false" maxlength="50000"
                      placeholder="Paste text to test the pattern against…"></textarea>
          </label>

          <div id="error" class="error" hidden></div>

          <div class="result-head" id="result-head" hidden>
            <span><b id="m-count">0</b> matches</span>
            <span id="g-count"></span>
            <span class="spacer"></span>
            <span id="trunc" hidden>(truncated)</span>
          </div>

          <div id="render" class="render" hidden></div>

          <div class="matches" id="matches"></div>
        </section>

        <aside class="side">
          <h2>Pattern library</h2>
          <p class="libhint">Saved in this file. Load one into the tester, or save the
            current pattern.</p>

          <form class="save-form" id="save-form" autocomplete="off">
            <input id="sf-name" type="text" maxlength="120" placeholder="Name (e.g. Email address)" />
            <textarea id="sf-note" maxlength="1000" placeholder="Optional note" rows="2"></textarea>
            <div class="sf-err" id="sf-err"></div>
            <div class="sf-row">
              <button type="submit" class="vessel-primary" id="sf-save">Save current pattern</button>
              <span class="editing" id="sf-editing" hidden></span>
              <button type="button" id="sf-cancel" hidden>Cancel</button>
            </div>
          </form>

          <div class="lib" id="lib"></div>
        </aside>
      </div>
    </div>

    <script>
      // ----------------------------------------------------------------------
      // Security note: ALL highlighting is built from HTML-escaped text segments.
      // The sample text is split on the byte spans the backend returns and each
      // piece is run through esc() before being concatenated into innerHTML. The
      // only non-escaped markup inserted is our own <mark>/<span> wrappers. Raw
      // user text is NEVER assigned to innerHTML.
      // ----------------------------------------------------------------------
      const esc = (s) =>
        String(s).replace(/[&<>"']/g, (c) =>
          ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])
        );

      const $pattern = document.getElementById("pattern");
      const $sample = document.getElementById("sample");
      const $flags = document.getElementById("flags");
      const $flagSuffix = document.getElementById("flag-suffix");
      const $error = document.getElementById("error");
      const $resultHead = document.getElementById("result-head");
      const $mCount = document.getElementById("m-count");
      const $gCount = document.getElementById("g-count");
      const $trunc = document.getElementById("trunc");
      const $render = document.getElementById("render");
      const $matches = document.getElementById("matches");
      const $status = document.getElementById("status");

      const j = (r) => r.json();

      function currentFlags() {
        const out = [];
        for (const cb of $flags.querySelectorAll("input[type=checkbox]")) {
          if (cb.checked) out.push(cb.dataset.flag);
        }
        return out.join("");
      }
      function setFlags(str) {
        const set = new Set((str || "").toLowerCase().split(""));
        for (const cb of $flags.querySelectorAll("input[type=checkbox]")) {
          cb.checked = set.has(cb.dataset.flag);
          cb.closest(".flag").classList.toggle("on", cb.checked);
        }
        updateSuffix();
      }
      function updateSuffix() {
        const f = currentFlags();
        $flagSuffix.textContent = f ? "/" + f : "/";
      }

      // Build highlighted HTML from escaped segments. `text` is the raw sample;
      // `matches` are {start,end,empty,groups:[{start,end}]} char spans from the
      // backend. We walk the text once, emitting escaped non-match runs and
      // <mark>-wrapped match runs (with nested <span class="grp"> for capture
      // group spans). Overlapping/zero-width handled defensively.
      function buildHighlight(text, matches) {
        // Collect boundary events to render groups inside matches. We render each
        // match independently over its [start,end) slice for clarity.
        let html = "";
        let cursor = 0;
        // matches come in document order from finditer.
        for (const m of matches) {
          const s = Math.max(0, Math.min(m.start, text.length));
          const e = Math.max(s, Math.min(m.end, text.length));
          if (s > cursor) html += esc(text.slice(cursor, s));
          if (m.empty || e === s) {
            html += '<span class="caret" title="zero-width match"></span>';
          } else {
            html += '<mark>' + renderMatchSlice(text, s, e, m.groups) + '</mark>';
          }
          cursor = Math.max(cursor, e);
        }
        if (cursor < text.length) html += esc(text.slice(cursor));
        return html;
      }

      // Render one match slice [s,e), wrapping participating capture-group spans
      // in <span class="grp">. Group spans that fall within the match are layered;
      // we use a simple boundary sweep over the slice so nested escaping is exact.
      function renderMatchSlice(text, s, e, groups) {
        // Build a depth map over the slice from group spans (only those inside).
        const bounds = [];
        for (const g of groups || []) {
          if (g.start == null || g.start < 0) continue; // non-participating
          const gs = Math.max(s, g.start), ge = Math.min(e, g.end);
          if (ge > gs) bounds.push([gs, ge]);
        }
        if (bounds.length === 0) return esc(text.slice(s, e));
        // collect cut points
        const cuts = new Set([s, e]);
        for (const [a, b] of bounds) { cuts.add(a); cuts.add(b); }
        const points = [...cuts].sort((a, b) => a - b);
        let out = "";
        for (let k = 0; k < points.length - 1; k++) {
          const a = points[k], b = points[k + 1];
          if (b <= a) continue;
          const inGroup = bounds.some(([ga, gb]) => ga <= a && b <= gb);
          const seg = esc(text.slice(a, b));
          out += inGroup ? '<span class="grp">' + seg + '</span>' : seg;
        }
        return out;
      }

      function showError(msg) {
        $error.textContent = msg;
        $error.hidden = false;
        $pattern.classList.add("invalid");
        $resultHead.hidden = true;
        $render.hidden = true;
        $matches.innerHTML = "";
        $status.textContent = "invalid pattern";
      }
      function clearError() {
        $error.hidden = true;
        $pattern.classList.remove("invalid");
      }

      function renderMatches(text, data) {
        $resultHead.hidden = false;
        $mCount.textContent = data.match_count;
        $gCount.textContent = data.group_count
          ? "· " + data.group_count + " group" + (data.group_count === 1 ? "" : "s")
          : "";
        $trunc.hidden = !data.truncated;

        // highlighted text — innerHTML is safe: every text run is esc()'d, only
        // our own <mark>/<span> wrappers are literal markup.
        $render.hidden = false;
        $render.innerHTML = text.length
          ? buildHighlight(text, data.matches)
          : '<span class="hint">No sample text yet.</span>';

        // per-match detail cards
        $matches.innerHTML = "";
        for (const m of data.matches) {
          const card = document.createElement("div");
          card.className = "match-card";

          const line = document.createElement("div");
          line.className = "mline";
          const val = document.createElement("span");
          val.className = "mval";
          val.textContent = m.empty ? "(zero-width match)" : m.value;
          const span = document.createElement("span");
          span.className = "span";
          span.textContent = "[" + m.start + ", " + m.end + ")";
          line.append(val, span);
          card.append(line);

          if (m.groups && m.groups.length) {
            const ul = document.createElement("ul");
            ul.className = "groups";
            for (const g of m.groups) {
              const li = document.createElement("li");
              const name = document.createElement("span");
              name.className = "gname";
              name.textContent = g.name ? g.name : "#" + g.index;
              const gv = document.createElement("span");
              if (g.value == null) {
                gv.className = "gval gnull";
                gv.textContent = "(no match)";
              } else {
                gv.className = "gval";
                gv.textContent = g.value;
              }
              li.append(name, gv);
              ul.append(li);
            }
            card.append(ul);
          }
          $matches.append(card);
        }
        $status.textContent = data.match_count + " match" + (data.match_count === 1 ? "" : "es");
      }

      let testTimer = null;
      let testSeq = 0;
      async function runTest() {
        const pattern = $pattern.value;
        const flags = currentFlags();
        const text = $sample.value;
        updateSuffix();
        if (!pattern) {
          clearError();
          $resultHead.hidden = true;
          $render.hidden = true;
          $matches.innerHTML = "";
          $status.textContent = "—";
          return;
        }
        const seq = ++testSeq;
        const res = await fetch("/api/test", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ pattern, flags, text }),
        }).then(j).catch(() => null);
        if (seq !== testSeq) return; // superseded by a newer keystroke
        if (!res) { showError("Could not run the test."); return; }
        if (!res.ok) { showError(res.error || "Pattern did not compile."); return; }
        clearError();
        renderMatches(text, res);
      }

      function scheduleTest() {
        clearTimeout(testTimer);
        testTimer = setTimeout(runTest, 130);
      }

      $pattern.addEventListener("input", scheduleTest);
      $sample.addEventListener("input", scheduleTest);
      $flags.addEventListener("change", (ev) => {
        const cb = ev.target;
        if (cb && cb.dataset && cb.dataset.flag) {
          cb.closest(".flag").classList.toggle("on", cb.checked);
        }
        scheduleTest();
      });

      // ---- pattern library --------------------------------------------------
      const $lib = document.getElementById("lib");
      const $saveForm = document.getElementById("save-form");
      const $sfName = document.getElementById("sf-name");
      const $sfNote = document.getElementById("sf-note");
      const $sfErr = document.getElementById("sf-err");
      const $sfSave = document.getElementById("sf-save");
      const $sfEditing = document.getElementById("sf-editing");
      const $sfCancel = document.getElementById("sf-cancel");

      let editingId = null;
      let libById = new Map();

      function setEditing(id) {
        editingId = id;
        if (id == null) {
          $sfSave.textContent = "Save current pattern";
          $sfEditing.hidden = true;
          $sfCancel.hidden = true;
        } else {
          const p = libById.get(id);
          $sfSave.textContent = "Update";
          $sfEditing.textContent = "editing: " + (p ? p.name : "#" + id);
          $sfEditing.hidden = false;
          $sfCancel.hidden = false;
        }
      }

      async function loadLib() {
        const data = await fetch("/api/patterns").then(j);
        libById = new Map(data.patterns.map((p) => [p.id, p]));
        $lib.innerHTML = "";
        if (data.patterns.length === 0) {
          const d = document.createElement("div");
          d.className = "empty";
          d.textContent = "No saved patterns yet.";
          $lib.append(d);
          return;
        }
        for (const p of data.patterns) {
          const item = document.createElement("div");
          item.className = "lib-item";

          const top = document.createElement("div");
          top.className = "li-top";
          const name = document.createElement("span");
          name.className = "li-name"; name.textContent = p.name;
          const fl = document.createElement("span");
          fl.className = "li-flags"; fl.textContent = p.flags ? "/" + p.flags : "";
          top.append(name, fl);

          const pat = document.createElement("div");
          pat.className = "li-pat"; pat.textContent = p.pattern;

          item.append(top, pat);

          if (p.note) {
            const note = document.createElement("div");
            note.className = "li-note"; note.textContent = p.note;
            item.append(note);
          }

          const acts = document.createElement("div");
          acts.className = "li-acts";
          const loadBtn = document.createElement("button");
          loadBtn.type = "button"; loadBtn.textContent = "Load";
          loadBtn.className = "vessel-primary";
          loadBtn.addEventListener("click", () => loadIntoTester(p.id));
          const editBtn = document.createElement("button");
          editBtn.type = "button"; editBtn.textContent = "Edit";
          editBtn.addEventListener("click", () => startEdit(p.id));
          const delBtn = document.createElement("button");
          delBtn.type = "button"; delBtn.textContent = "Delete";
          delBtn.className = "vessel-danger";
          delBtn.addEventListener("click", () => removePattern(p.id));
          acts.append(loadBtn, editBtn, delBtn);
          item.append(acts);

          $lib.append(item);
        }
      }

      function loadIntoTester(id) {
        const p = libById.get(id);
        if (!p) return;
        $pattern.value = p.pattern;
        setFlags(p.flags);
        runTest();
        $pattern.focus();
      }

      function startEdit(id) {
        const p = libById.get(id);
        if (!p) return;
        // load it into the tester too, so "Update" saves what you see
        $pattern.value = p.pattern;
        setFlags(p.flags);
        $sfName.value = p.name;
        $sfNote.value = p.note || "";
        $sfErr.textContent = "";
        setEditing(id);
        runTest();
        $sfName.focus();
      }

      async function saveCurrent(ev) {
        ev.preventDefault();
        $sfErr.textContent = "";
        const payload = {
          name: $sfName.value,
          pattern: $pattern.value,
          flags: currentFlags(),
          note: $sfNote.value,
        };
        if (!payload.name.trim()) { $sfErr.textContent = "Give the pattern a name."; return; }
        if (!payload.pattern) { $sfErr.textContent = "Enter a pattern to save."; return; }

        const url = editingId == null ? "/api/patterns" : "/api/patterns/" + editingId;
        const method = editingId == null ? "POST" : "PUT";
        const res = await fetch(url, {
          method,
          headers: { "content-type": "application/json" },
          body: JSON.stringify(payload),
        });
        if (!res.ok) {
          let msg = "Could not save the pattern.";
          try {
            const d = await res.json();
            if (typeof d.detail === "string") msg = d.detail;
            else if (Array.isArray(d.detail) && d.detail[0]?.msg) msg = d.detail[0].msg;
          } catch (_) {}
          $sfErr.textContent = msg;
          return;
        }
        $sfName.value = ""; $sfNote.value = "";
        setEditing(null);
        await loadLib();
      }

      async function removePattern(id) {
        const p = libById.get(id);
        const label = p ? '“' + p.name + '”' : "this pattern";
        if (!confirm("Delete " + label + "?")) return;
        const res = await fetch("/api/patterns/" + id, { method: "DELETE" });
        if (res.ok) {
          if (editingId === id) setEditing(null);
          await loadLib();
        }
      }

      $saveForm.addEventListener("submit", saveCurrent);
      $sfCancel.addEventListener("click", () => {
        setEditing(null);
        $sfName.value = ""; $sfNote.value = ""; $sfErr.textContent = "";
      });

      // ---- boot -------------------------------------------------------------
      // A friendly default so the tester shows something on first open.
      $sample.value =
        "Contact us at hello@getvessel.dev or support@example.com.\n" +
        "Backup line: ops+oncall@example.co.uk (24/7).";
      $pattern.value = "[\\w.+-]+@[\\w-]+\\.[\\w.-]+";
      setFlags("i");
      loadLib();
      runTest();
    </script>
  </body>
</html>
