<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Notes</title>
    <!-- No colors here — the Vessel theme styles plain semantic HTML. This style
         block is layout only. Toggle light/dark or switch themes in the host. -->
    <style>
      body { display: flex; flex-direction: column; gap: 12px; max-width: 560px; }
      textarea { min-height: 220px; width: 100%; }
      .row { display: flex; gap: 10px; align-items: center; }
    </style>
  </head>
  <body>
    <h1>Notes</h1>
    <p class="vessel-muted">
      An ordinary <code>fetch('/api/note')</code> UI backed by FastAPI + SQLite in Pyodide —
      styled entirely by the Vessel theme.
    </p>
    <textarea id="note" placeholder="Type a note, then Save…"></textarea>
    <div class="row">
      <button id="save" class="vessel-primary">Save</button>
      <span id="status" class="vessel-muted"></span>
    </div>
    <script>
      const $note = document.getElementById("note");
      const $save = document.getElementById("save");
      const $status = document.getElementById("status");

      async function load() {
        const res = await fetch("/api/note");
        const data = await res.json();
        $note.value = data.body || "";
        $status.textContent = "loaded";
      }

      $save.addEventListener("click", async () => {
        $status.textContent = "saving…";
        const res = await fetch("/api/note", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ body: $note.value }),
        });
        $status.textContent = res.ok ? "saved to bundle" : "error: " + res.status;
      });

      load();
    </script>
  </body>
</html>
