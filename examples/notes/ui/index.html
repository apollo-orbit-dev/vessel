<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Notes</title>
    <style>
      :root { color-scheme: light dark; font-family: system-ui, sans-serif; }
      body { margin: 0; padding: 24px; display: flex; flex-direction: column; gap: 12px; }
      h1 { font-size: 15px; font-weight: 600; margin: 0; }
      p { margin: 0; font-size: 12px; opacity: 0.6; }
      textarea { font: inherit; padding: 10px; min-height: 200px; resize: vertical; }
      .row { display: flex; gap: 10px; align-items: center; }
      button { font: inherit; padding: 8px 16px; cursor: pointer; }
      #status { font-size: 12px; opacity: 0.7; }
    </style>
  </head>
  <body>
    <h1>Notes</h1>
    <p>An ordinary <code>fetch('/api/note')</code> UI backed by FastAPI + SQLite, running in Pyodide.</p>
    <textarea id="note" placeholder="Type a note, then Save…"></textarea>
    <div class="row">
      <button id="save">Save</button>
      <span id="status"></span>
    </div>
    <script>
      const $note = document.getElementById("note");
      const $save = document.getElementById("save");
      const $status = document.getElementById("status");

      async function load() {
        const res = await fetch("/api/note");
        const data = await res.json();
        $note.value = data.body || "";
        $status.textContent = "loaded";
      }

      $save.addEventListener("click", async () => {
        $status.textContent = "saving…";
        const res = await fetch("/api/note", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ body: $note.value }),
        });
        if (res.ok) {
          $status.textContent = "saved to bundle";
        } else {
          $status.textContent = "error: " + res.status;
        }
      });

      load();
    </script>
  </body>
</html>
