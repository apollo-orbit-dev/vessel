<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Habits</title>
    <!-- Layout only — all chrome colors come from the Vessel theme (--vessel-*
         tokens + base styles injected by the host). Each habit also carries its
         own categorical hue (not part of the theme) used for its filled day
         cells + dot; today's cell gets a ring. Toggle light/dark in the host and
         the chrome follows. Numbers use the mono token; prose the UI font. -->
    <style>
      html, body { height: 100%; }
      body {
        margin: 0; padding: 0;
        font-family: var(--vessel-font);
        color: var(--vessel-text);
        background: var(--vessel-bg);
      }
      .app { display: flex; flex-direction: column; height: 100vh; }

      .header {
        display: flex; align-items: baseline; gap: 12px;
        padding: 16px 28px;
        background: var(--vessel-surface);
        border-bottom: 1px solid var(--vessel-border);
      }
      .header .title { font-weight: 600; font-size: 16px; letter-spacing: -0.01em; }
      .header .sub {
        font-family: var(--vessel-font-mono); font-size: 11.5px;
        color: var(--vessel-text-muted);
      }
      .header .spacer { flex: 1; }
      .header .hint {
        font-family: var(--vessel-font-mono); font-size: 11.5px;
        color: var(--vessel-text-muted);
      }

      .axis, .row {
        display: grid; grid-template-columns: 1fr auto 92px;
        gap: 18px; align-items: center;
      }
      .axis { padding: 14px 28px 8px; }
      .axis .label {
        font-weight: 600; font-size: 10px; letter-spacing: 0.07em;
        text-transform: uppercase; color: var(--vessel-text-muted);
      }
      .axis .label.right { text-align: right; }
      .axis .days { display: flex; gap: 5px; }
      .axis .daycap {
        width: 20px; text-align: center;
        font-family: var(--vessel-font-mono); font-size: 9.5px;
        color: var(--vessel-text-muted);
      }
      .axis .daycap.now { color: var(--vessel-text); }

      .rows { flex: 1; min-height: 0; overflow-y: auto; padding: 0 28px; }
      .row { padding: 13px 0; border-top: 1px solid var(--vessel-border); }

      .name {
        display: inline-flex; align-items: center; gap: 9px;
        font-size: 14px; color: var(--vessel-text);
        min-width: 0;
      }
      .name .label {
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      }
      .dot {
        width: 9px; height: 9px; border-radius: 50%;
        flex: 0 0 auto;
      }
      /* Per-row edit/delete affordances — quiet until you hover the row. */
      .name .acts {
        display: inline-flex; gap: 2px; margin-left: 4px;
        opacity: 0; transition: opacity .12s;
      }
      .row:hover .name .acts, .name .acts:focus-within { opacity: 1; }
      .iconbtn {
        display: inline-flex; align-items: center; justify-content: center;
        width: 22px; height: 22px; padding: 0; border-radius: 6px;
        background: transparent; border: 1px solid transparent;
        color: var(--vessel-text-muted); cursor: pointer;
        transition: background .12s, color .12s, border-color .12s;
      }
      .iconbtn:hover { background: var(--vessel-field); color: var(--vessel-text); }
      .iconbtn.danger:hover { color: var(--vessel-danger); }
      .iconbtn svg { display: block; }

      /* Add-habit + edit form. Inputs lean on the host base styles; only the
         hue swatches carry a categorical color (the oklch ramp, not a token). */
      .editrow {
        grid-template-columns: 1fr; gap: 10px;
        padding: 13px 0; border-top: 1px solid var(--vessel-border);
      }
      .editform {
        display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      }
      .editform input[type="text"] {
        flex: 1 1 200px; min-width: 0; font-size: 14px;
        font-family: var(--vessel-font);
      }
      .hues { display: inline-flex; gap: 4px; flex-wrap: wrap; }
      .swatch {
        width: 22px; height: 22px; border-radius: 50%; padding: 0;
        cursor: pointer; border: 2px solid transparent;
        transition: transform .08s, border-color .12s;
      }
      .swatch:active { transform: scale(0.88); }
      .swatch.sel { border-color: var(--vessel-text); }
      .editform .acts { display: inline-flex; gap: 6px; }
      .addtoggle { padding: 13px 0; border-top: 1px solid var(--vessel-border); }

      .cells { display: flex; gap: 5px; }
      .cell {
        width: 20px; height: 20px; border-radius: 6px; padding: 0;
        cursor: pointer; background: var(--vessel-field);
        border: 1px solid var(--vessel-border);
        transition: background .12s, transform .08s;
      }
      .cell:active { transform: scale(0.88); }

      .streak {
        display: inline-flex; align-items: center; justify-content: flex-end;
        gap: 6px;
        font-family: var(--vessel-font-mono); font-size: 13px;
        color: var(--vessel-text-muted);
      }
      .streak.live { color: var(--vessel-text); }
      .streak svg { display: block; }

      .footer {
        display: flex; align-items: center; gap: 12px;
        padding: 12px 28px;
        border-top: 1px solid var(--vessel-border);
        background: var(--vessel-surface);
      }
      .footer .item {
        display: inline-flex; align-items: center; gap: 6px;
        font-family: var(--vessel-font-mono); font-size: 11.5px;
        color: var(--vessel-text-muted);
      }
      .footer .spacer { flex: 1; }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="header">
        <span class="title">Habits</span>
        <span class="sub">last 21 days · June 2026</span>
        <span class="spacer"></span>
        <span class="hint">tap a day to log</span>
      </header>

      <div class="axis" id="axis">
        <span class="label">Habit</span>
        <div class="days" id="daycaps"></div>
        <span class="label right">Streak</span>
      </div>

      <div class="rows" id="rows"></div>

      <footer class="footer">
        <span class="item" id="count">— habits</span>
        <button type="button" id="addbtn" class="vessel-primary">+ Add habit</button>
        <span class="spacer"></span>
        <span class="item" id="longest"></span>
      </footer>
    </div>

    <script>
      const $rows = document.getElementById("rows");
      const $daycaps = document.getElementById("daycaps");
      const $count = document.getElementById("count");
      const $longest = document.getElementById("longest");
      const $addbtn = document.getElementById("addbtn");

      let DAYS = 21;
      let TODAY = 20;
      let habits = [];
      // Which habit id is being edited, or "new" for the add-habit form, or null.
      let editing = null;

      // The categorical hue ramp users pick from — whole-degree oklch hue angles
      // spread around the wheel. NOT theme tokens; painted via hueColor().
      const HUE_RAMP = [230, 200, 155, 95, 40, 20, 0, 320, 280, 255];

      const j = (r) => r.json();

      // The host doesn't expose its light/dark state to the iframe, but the
      // injected --vessel-bg is light in light mode and dark in dark mode, so we
      // sniff its luminance to lift the categorical hues a step in dark mode.
      function isDark() {
        const bg = getComputedStyle(document.body).backgroundColor;
        const m = bg.match(/\d+(\.\d+)?/g);
        if (!m) return false;
        const [r, g, b] = m.map(Number);
        return 0.299 * r + 0.587 * g + 0.114 * b < 128;
      }

      // Categorical per-habit color — a fixed oklch ramp, NOT a theme token.
      function hueColor(hue) {
        const L = isDark() ? 0.7 : 0.56;
        return `oklch(${L} 0.1 ${hue})`;
      }

      // Build an inline monoline flame icon (stroke ~1.6, currentColor).
      function flame(size, color) {
        const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        svg.setAttribute("width", size);
        svg.setAttribute("height", size);
        svg.setAttribute("viewBox", "0 0 24 24");
        svg.setAttribute("fill", "none");
        svg.setAttribute("stroke", "currentColor");
        svg.setAttribute("stroke-width", "1.6");
        svg.setAttribute("stroke-linecap", "round");
        svg.setAttribute("stroke-linejoin", "round");
        svg.setAttribute("aria-hidden", "true");
        if (color) svg.style.color = color;
        const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
        p.setAttribute(
          "d",
          "M13 3.5c.4 2.6 3.5 4 3.5 8A4.5 4.5 0 0 1 7.5 12c0-1.4.5-2.3 1.2-3.1.1 1.1.9 1.9 1.8 1.9-.7-2.8 1.3-5.6 2.5-7.3z"
        );
        svg.append(p);
        return svg;
      }

      // A small monoline icon (stroke 1.6, currentColor) from a path "d".
      function icon(d, size) {
        const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        svg.setAttribute("width", size || 15);
        svg.setAttribute("height", size || 15);
        svg.setAttribute("viewBox", "0 0 24 24");
        svg.setAttribute("fill", "none");
        svg.setAttribute("stroke", "currentColor");
        svg.setAttribute("stroke-width", "1.6");
        svg.setAttribute("stroke-linecap", "round");
        svg.setAttribute("stroke-linejoin", "round");
        svg.setAttribute("aria-hidden", "true");
        for (const seg of d.split("|")) {
          const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
          p.setAttribute("d", seg);
          svg.append(p);
        }
        return svg;
      }
      const ICON_EDIT = "M12 20h9|M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z";
      const ICON_TRASH = "M4 7h16|M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2|M6 7l1 13a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1l1-13";

      function renderAxis() {
        $daycaps.innerHTML = "";
        for (let i = 0; i < DAYS; i++) {
          const c = document.createElement("span");
          c.className = "daycap" + (i === TODAY ? " now" : "");
          c.textContent = i === TODAY ? "now" : i % 7 === 0 ? "·" : "";
          $daycaps.append(c);
        }
      }

      function paintCell(btn, on, hue, today) {
        const col = hueColor(hue);
        btn.style.background = on ? col : "var(--vessel-field)";
        if (today) {
          btn.style.border = "1.5px solid " + (on ? col : "var(--vessel-accent)");
        } else {
          btn.style.border = on ? "1px solid transparent" : "1px solid var(--vessel-border)";
        }
      }

      function renderStreak($el, n, hue) {
        $el.innerHTML = "";
        $el.className = "streak" + (n > 0 ? " live" : "");
        if (n > 0) $el.append(flame(13, hueColor(hue)));
        $el.append(document.createTextNode(n + "d"));
      }

      function renderRows() {
        $rows.innerHTML = "";
        for (const h of habits) {
          if (editing === h.id) {
            $rows.append(buildEditForm(h));
            continue;
          }
          const row = document.createElement("div");
          row.className = "row";

          const name = document.createElement("span");
          name.className = "name";
          const dot = document.createElement("span");
          dot.className = "dot";
          dot.style.background = hueColor(h.hue);
          // Use textContent (not innerHTML) so habit names can't inject markup.
          const label = document.createElement("span");
          label.className = "label";
          label.textContent = h.name;

          const acts = document.createElement("span");
          acts.className = "acts";
          const editBtn = document.createElement("button");
          editBtn.type = "button";
          editBtn.className = "iconbtn";
          editBtn.title = "Edit habit";
          editBtn.setAttribute("aria-label", "Edit habit");
          editBtn.append(icon(ICON_EDIT));
          editBtn.onclick = () => { editing = h.id; renderRows(); };
          const delBtn = document.createElement("button");
          delBtn.type = "button";
          delBtn.className = "iconbtn danger";
          delBtn.title = "Delete habit";
          delBtn.setAttribute("aria-label", "Delete habit");
          delBtn.append(icon(ICON_TRASH));
          delBtn.onclick = () => removeHabit(h);
          acts.append(editBtn, delBtn);

          name.append(dot, label, acts);

          const cells = document.createElement("div");
          cells.className = "cells";
          const doneSet = new Set(h.done);
          for (let di = 0; di < DAYS; di++) {
            const btn = document.createElement("button");
            btn.className = "cell";
            btn.title = di === TODAY ? "today" : "day " + (di + 1);
            paintCell(btn, doneSet.has(di), h.hue, di === TODAY);
            btn.onclick = () => toggle(h, di, btn);
            cells.append(btn);
          }

          const streak = document.createElement("span");
          renderStreak(streak, h.streak, h.hue);

          row.append(name, cells, streak);
          row._streakEl = streak;
          h._row = row;
          $rows.append(row);
        }
        if (editing === "new") $rows.append(buildEditForm(null));
        renderFooter();
      }

      // An inline add/edit form. `h` is the habit being edited, or null to add.
      function buildEditForm(h) {
        let hue = h ? h.hue : HUE_RAMP[0];

        const row = document.createElement("div");
        row.className = "editrow";
        const form = document.createElement("form");
        form.className = "editform";

        const input = document.createElement("input");
        input.type = "text";
        input.maxLength = 80; // mirrors the server-side NAME_MAX cap
        input.placeholder = "Habit name";
        input.value = h ? h.name : "";

        const hues = document.createElement("div");
        hues.className = "hues";
        const swatches = [];
        for (const ramp of HUE_RAMP) {
          const sw = document.createElement("button");
          sw.type = "button";
          sw.className = "swatch" + (ramp === hue ? " sel" : "");
          sw.style.background = hueColor(ramp);
          sw.title = "Hue " + ramp;
          sw.setAttribute("aria-label", "Hue " + ramp);
          sw.onclick = () => {
            hue = ramp;
            for (const s of swatches) s.classList.toggle("sel", s._hue === hue);
          };
          sw._hue = ramp;
          swatches.push(sw);
          hues.append(sw);
        }

        const acts = document.createElement("span");
        acts.className = "acts";
        const save = document.createElement("button");
        save.type = "submit";
        save.className = "vessel-primary";
        save.textContent = h ? "Save" : "Add";
        const cancel = document.createElement("button");
        cancel.type = "button";
        cancel.textContent = "Cancel";
        cancel.onclick = () => { editing = null; renderRows(); };
        acts.append(save, cancel);

        form.onsubmit = (e) => {
          e.preventDefault();
          const name = input.value.trim();
          if (!name) { input.focus(); return; }
          if (h) saveHabit(h, name, hue);
          else addHabit(name, hue);
        };

        form.append(input, hues, acts);
        row.append(form);
        // Focus the name field on next frame (after it's in the DOM).
        requestAnimationFrame(() => input.focus());
        return row;
      }

      function renderFooter() {
        $count.textContent = habits.length + " habits";
        const longest = habits.reduce((m, h) => Math.max(m, h.streak), 0);
        $longest.innerHTML = "";
        $longest.append(flame(13, "var(--vessel-accent)"));
        $longest.append(document.createTextNode(" longest active · " + longest + "d"));
      }

      async function toggle(h, di, btn) {
        const res = await fetch("/api/toggle", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ habit_id: h.id, day: di }),
        }).then(j);
        // Keep local state in sync so a re-theme repaint stays correct.
        const set = new Set(h.done);
        res.on ? set.add(di) : set.delete(di);
        h.done = [...set].sort((a, b) => a - b);
        h.streak = res.streak;
        paintCell(btn, res.on, h.hue, di === TODAY);
        renderStreak(h._row._streakEl, h.streak, h.hue);
        renderFooter();
      }

      async function addHabit(name, hue) {
        const res = await fetch("/api/habits", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ name, hue }),
        });
        if (!res.ok) return;
        habits.push(await res.json());
        editing = null;
        renderRows();
      }

      async function saveHabit(h, name, hue) {
        const res = await fetch("/api/habits/" + h.id, {
          method: "PUT",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ name, hue }),
        });
        if (!res.ok) return;
        const updated = await res.json();
        // Keep done/streak/_row; only name + hue changed.
        h.name = updated.name;
        h.hue = updated.hue;
        editing = null;
        renderRows();
      }

      async function removeHabit(h) {
        if (!window.confirm('Delete "' + h.name + '" and its completions?')) return;
        const res = await fetch("/api/habits/" + h.id, { method: "DELETE" });
        if (!res.ok) return;
        habits = habits.filter((x) => x.id !== h.id);
        if (editing === h.id) editing = null;
        renderRows();
      }

      $addbtn.onclick = () => {
        if (editing === "new") return;
        editing = "new";
        renderRows();
        $rows.scrollTop = $rows.scrollHeight;
      };

      (async () => {
        const data = await fetch("/api/habits").then(j);
        DAYS = data.days;
        TODAY = data.today;
        habits = data.habits;
        renderAxis();
        renderRows();
      })();
    </script>
  </body>
</html>
