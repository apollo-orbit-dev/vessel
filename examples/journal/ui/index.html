<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Journal</title>
    <!-- Layout only — all colors come from the Vessel theme (--vessel-* tokens
         + base component styles injected by the host). Toggle light/dark or the
         theme in the host and this UI follows. Mood dots are categorical and use
         a small fixed oklch ramp (not themed). The <mark> highlight is accent-
         tinted via color-mix. -->
    <style>
      html, body { height: 100%; }
      body { margin: 0; padding: 0; background: var(--vessel-bg); color: var(--vessel-text); }
      .app { display: flex; flex-direction: column; height: 100vh; min-height: 0; }

      /* header strip */
      .head {
        display: flex; align-items: center; gap: 14px;
        padding: 13px 30px;
        background: var(--vessel-surface);
        border-bottom: 1px solid var(--vessel-border);
      }
      .head h1 {
        margin: 0; font: 600 16px var(--vessel-font);
        letter-spacing: -0.01em; color: var(--vessel-text);
      }
      .streak {
        display: inline-flex; align-items: center; gap: 6px;
        font: 11.5px var(--vessel-font-mono); color: var(--vessel-text-muted);
      }
      .streak svg { color: var(--vessel-accent); }
      .spacer { flex: 1; }
      .search {
        display: flex; align-items: center; gap: 8px;
        width: 240px; height: 32px; padding: 0 11px;
        border-radius: 8px;
        background: var(--vessel-field);
        border: 1px solid var(--vessel-border);
        color: var(--vessel-text-muted);
        box-sizing: border-box;
      }
      .search svg { flex: 0 0 auto; }
      .search input {
        flex: 1; min-width: 0; border: none; outline: none; background: transparent;
        font: 13px var(--vessel-font); color: var(--vessel-text); padding: 0;
      }

      /* "New entry" button in the header — accent, matches host primary */
      .new-btn {
        display: inline-flex; align-items: center; gap: 6px;
        height: 32px; padding: 0 13px; border: none; border-radius: 8px;
        background: var(--vessel-accent); color: var(--vessel-accent-text);
        font: 600 13px var(--vessel-font); cursor: pointer; box-sizing: border-box;
      }
      .new-btn svg { color: currentColor; }

      /* timeline */
      .timeline { flex: 1; min-height: 0; overflow-y: auto; padding: 8px 0; }
      .entry {
        display: grid; grid-template-columns: 132px 1fr; gap: 22px;
        padding: 20px 30px;
        border-bottom: 1px solid var(--vessel-border);
      }
      .entry:last-child { border-bottom: none; }
      .rail { padding-top: 2px; }
      .rail .date { font: 12px var(--vessel-font-mono); color: var(--vessel-text); }
      .rail .time { margin-top: 4px; font: 11px var(--vessel-font-mono); color: var(--vessel-text-muted); }
      .mood {
        display: inline-flex; align-items: center; gap: 6px; margin-top: 11px;
        font: 11px var(--vessel-font); color: var(--vessel-text-muted);
      }
      .dot { width: 7px; height: 7px; border-radius: 50%; flex: 0 0 auto; }

      .entry .main { min-width: 0; }
      .entry .row { display: flex; align-items: baseline; gap: 10px; }
      .entry h3 {
        margin: 0; font: 600 17px var(--vessel-font);
        letter-spacing: -0.012em; color: var(--vessel-text); flex: 1; min-width: 0;
      }
      /* per-entry edit/delete — quiet, only ink on hover of the row */
      .acts { display: flex; gap: 2px; flex: 0 0 auto; opacity: 0; transition: opacity .12s; }
      .entry:hover .acts, .entry:focus-within .acts { opacity: 1; }
      .acts button {
        display: inline-flex; align-items: center; justify-content: center;
        width: 26px; height: 26px; padding: 0; border: none; border-radius: 6px;
        background: transparent; color: var(--vessel-text-muted); cursor: pointer;
      }
      .acts button:hover { background: var(--vessel-field); color: var(--vessel-text); }
      .acts button.del:hover { color: var(--vessel-danger); }
      .entry p {
        margin: 8px 0 0; font: 14px var(--vessel-font); line-height: 1.66;
        letter-spacing: -0.003em; color: var(--vessel-text-muted);
      }
      mark {
        background: color-mix(in srgb, var(--vessel-accent) 22%, transparent);
        color: var(--vessel-text); border-radius: 3px; padding: 0 1px;
      }

      .empty {
        padding: 48px; text-align: center;
        font: 13px var(--vessel-font); color: var(--vessel-text-muted);
      }

      /* footer — quiet FTS cue */
      .foot {
        display: flex; align-items: center; gap: 12px;
        padding: 10px 30px;
        border-top: 1px solid var(--vessel-border);
        background: var(--vessel-surface);
      }
      .foot span { font: 11px var(--vessel-font-mono); color: var(--vessel-text-muted); }

      /* composer modal — styled to match the timeline (surface card, hairline border) */
      .scrim {
        position: fixed; inset: 0; display: none;
        align-items: center; justify-content: center;
        background: color-mix(in srgb, var(--vessel-bg) 60%, transparent);
        padding: 24px; box-sizing: border-box;
      }
      .scrim.open { display: flex; }
      .modal {
        width: 100%; max-width: 520px; max-height: 100%; overflow-y: auto;
        background: var(--vessel-surface);
        border: 1px solid var(--vessel-border);
        border-radius: 12px; padding: 22px 24px;
        box-sizing: border-box;
      }
      .modal h2 {
        margin: 0 0 16px; font: 600 16px var(--vessel-font);
        letter-spacing: -0.01em; color: var(--vessel-text);
      }
      .field-row { display: flex; gap: 12px; margin-bottom: 12px; }
      .field-row > label { flex: 1; }
      .modal label {
        display: block; margin-bottom: 12px;
        font: 11px var(--vessel-font); color: var(--vessel-text-muted);
        letter-spacing: 0.01em;
      }
      .modal label > span { display: block; margin-bottom: 5px; }
      .modal input, .modal textarea, .modal select {
        width: 100%; box-sizing: border-box; padding: 8px 11px;
        border-radius: 8px; border: 1px solid var(--vessel-border);
        background: var(--vessel-field); color: var(--vessel-text);
        font: 14px var(--vessel-font); outline: none;
      }
      /* dates/times set in mono, per the spec */
      .modal input.mono { font-family: var(--vessel-font-mono); font-size: 13px; }
      .modal textarea { resize: vertical; line-height: 1.66; min-height: 120px; }
      .modal .err {
        margin: 0 0 12px; font: 12px var(--vessel-font); color: var(--vessel-danger);
        min-height: 0;
      }
      .modal .actions {
        display: flex; align-items: center; gap: 10px;
        justify-content: flex-end; margin-top: 16px;
      }
      .modal .actions .spacer { flex: 1; }
      .btn {
        height: 34px; padding: 0 15px; border-radius: 8px;
        border: 1px solid var(--vessel-border); background: var(--vessel-field);
        color: var(--vessel-text); font: 600 13px var(--vessel-font); cursor: pointer;
      }
      .btn.primary { border-color: transparent; background: var(--vessel-accent); color: var(--vessel-accent-text); }
      .btn.danger { border-color: transparent; background: transparent; color: var(--vessel-danger); margin-right: auto; }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="head">
        <h1>Journal</h1>
        <span class="streak">
          <!-- flame, monoline, stroke 1.6, currentColor -->
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M13 3.5c.4 2.6 3.5 4 3.5 8A4.5 4.5 0 0 1 7.5 12c0-1.4.5-2.3 1.2-3.1.1 1.1.9 1.9 1.8 1.9-.7-2.8 1.3-5.6 2.5-7.3z" />
          </svg>
          <span id="streak-text">31-day streak</span>
        </span>
        <div class="spacer"></div>
        <div class="search">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="6.4" /><line x1="20" y1="20" x2="15.8" y2="15.8" />
          </svg>
          <input id="q" type="search" placeholder="Search entries" autocomplete="off" spellcheck="false" />
        </div>
        <button id="new-btn" class="new-btn" type="button">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" />
          </svg>
          New entry
        </button>
      </header>

      <div class="timeline" id="timeline"></div>

      <footer class="foot">
        <span id="index-cue">full-text index · — entries</span>
        <div class="spacer"></div>
        <span id="match-cue">showing recent</span>
      </footer>
    </div>

    <!-- composer modal — add / edit an entry -->
    <div class="scrim" id="scrim">
      <form class="modal" id="modal" autocomplete="off">
        <h2 id="modal-title">New entry</h2>
        <p class="err" id="modal-err"></p>
        <label>
          <span>Title</span>
          <input id="f-title" type="text" maxlength="200" placeholder="A short title" />
        </label>
        <div class="field-row">
          <label>
            <span>Date</span>
            <input id="f-date" class="mono" type="text" maxlength="40" placeholder="Thu · Jun 12" />
          </label>
          <label>
            <span>Time</span>
            <input id="f-time" class="mono" type="text" maxlength="5" placeholder="23:40" />
          </label>
          <label>
            <span>Mood</span>
            <select id="f-mood"></select>
          </label>
        </div>
        <label>
          <span>Body</span>
          <textarea id="f-body" maxlength="8000" placeholder="Write your entry…"></textarea>
        </label>
        <div class="actions">
          <button type="button" class="btn danger" id="f-delete" hidden>Delete</button>
          <div class="spacer"></div>
          <button type="button" class="btn" id="f-cancel">Cancel</button>
          <button type="submit" class="btn primary" id="f-save">Save</button>
        </div>
      </form>
    </div>

    <script>
      // Categorical mood ramp — fixed oklch hues, not theme-driven. Keys are the
      // fixed mood vocabulary (must match MOODS in app/main.py).
      const MOOD_HUE = { still: 230, awed: 200, wary: 70, good: 155, tired: 300 };
      const MOODS = Object.keys(MOOD_HUE);
      const isDark = () =>
        matchMedia && matchMedia("(prefers-color-scheme: dark)").matches;
      const moodColor = (mood) => {
        const h = MOOD_HUE[mood] ?? 230;
        const l = isDark() ? 0.72 : 0.56;
        return `oklch(${l} 0.08 ${h})`;
      };

      const $timeline = document.getElementById("timeline");
      const $q = document.getElementById("q");
      const $indexCue = document.getElementById("index-cue");
      const $matchCue = document.getElementById("match-cue");

      let total = 0;          // total entries in the full-text index
      let lastQuery = "";
      let byId = new Map();   // id -> entry, for the edit form

      const j = (r) => r.json();
      const esc = (s) =>
        s.replace(/[&<>"']/g, (c) =>
          ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])
        );

      // Highlight every case-insensitive occurrence of q in text, returning safe
      // HTML (text escaped first, matches wrapped in <mark>). Also returns count.
      function highlight(text, q) {
        if (!q) return { html: esc(text), count: 0 };
        const low = text.toLowerCase();
        const ql = q.toLowerCase();
        let i = 0, out = "", count = 0;
        while (i < text.length) {
          const f = low.indexOf(ql, i);
          if (f === -1) { out += esc(text.slice(i)); break; }
          if (f > i) out += esc(text.slice(i, f));
          out += "<mark>" + esc(text.slice(f, f + q.length)) + "</mark>";
          i = f + q.length;
          count++;
        }
        return { html: out, count };
      }

      // monoline pencil / trash icons for the per-entry actions
      const ICON_EDIT =
        '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"' +
        ' stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' +
        '<path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>';
      const ICON_DEL =
        '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"' +
        ' stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' +
        '<polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>' +
        '<path d="M10 11v6M14 11v6"/><path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/></svg>';

      function render(entries, q) {
        $timeline.innerHTML = "";
        byId = new Map(entries.map((e) => [e.id, e]));
        if (entries.length === 0) {
          const d = document.createElement("div");
          d.className = "empty";
          d.textContent = `No entries contain “${q}”.`;
          $timeline.append(d);
          return 0;
        }
        let matches = 0;
        for (const e of entries) {
          const t = highlight(e.title, q);
          const b = highlight(e.body, q);
          matches += t.count + b.count;

          const art = document.createElement("article");
          art.className = "entry";

          const rail = document.createElement("div");
          rail.className = "rail";
          const date = document.createElement("div");
          date.className = "date"; date.textContent = e.date;
          const time = document.createElement("div");
          time.className = "time"; time.textContent = e.time;
          const mood = document.createElement("span");
          mood.className = "mood";
          const dot = document.createElement("span");
          dot.className = "dot";
          dot.style.background = moodColor(e.mood);
          mood.append(dot, document.createTextNode(e.mood));
          rail.append(date, time, mood);

          const main = document.createElement("div");
          main.className = "main";
          const row = document.createElement("div");
          row.className = "row";
          const h3 = document.createElement("h3");
          h3.innerHTML = t.html;  // user text escaped in highlight(); <mark> is the only markup

          const acts = document.createElement("div");
          acts.className = "acts";
          const editBtn = document.createElement("button");
          editBtn.type = "button";
          editBtn.title = "Edit entry";
          editBtn.innerHTML = ICON_EDIT;  // trusted constant SVG
          editBtn.addEventListener("click", () => openEdit(e.id));
          const delBtn = document.createElement("button");
          delBtn.type = "button";
          delBtn.className = "del";
          delBtn.title = "Delete entry";
          delBtn.innerHTML = ICON_DEL;    // trusted constant SVG
          delBtn.addEventListener("click", () => removeEntry(e.id));
          acts.append(editBtn, delBtn);

          row.append(h3, acts);
          const p = document.createElement("p");
          p.innerHTML = b.html;  // user text escaped in highlight()
          main.append(row, p);

          art.append(rail, main);
          $timeline.append(art);
        }
        return matches;
      }

      async function load(q) {
        lastQuery = q;
        const url = q ? "/api/entries?q=" + encodeURIComponent(q) : "/api/entries";
        const data = await fetch(url).then(j);
        if (q !== lastQuery) return; // a newer keystroke superseded this one
        total = data.total;
        $indexCue.textContent = `full-text index · ${total} entries`;
        const matches = render(data.entries, q.trim());
        const n = data.entries.length;
        if (q.trim()) {
          $matchCue.textContent =
            `${matches} match${matches === 1 ? "" : "es"} · ${n} ${n === 1 ? "entry" : "entries"}`;
        } else {
          $matchCue.textContent = "showing recent";
        }
      }

      let timer = null;
      $q.addEventListener("input", () => {
        clearTimeout(timer);
        timer = setTimeout(() => load($q.value), 120);
      });

      // ---- composer modal (add / edit) -------------------------------------
      const $scrim = document.getElementById("scrim");
      const $modal = document.getElementById("modal");
      const $modalTitle = document.getElementById("modal-title");
      const $err = document.getElementById("modal-err");
      const $fTitle = document.getElementById("f-title");
      const $fDate = document.getElementById("f-date");
      const $fTime = document.getElementById("f-time");
      const $fMood = document.getElementById("f-mood");
      const $fBody = document.getElementById("f-body");
      const $fDelete = document.getElementById("f-delete");

      // Build the mood <select> from the fixed vocabulary.
      for (const m of MOODS) {
        const opt = document.createElement("option");
        opt.value = m; opt.textContent = m;
        $fMood.append(opt);
      }

      let editingId = null;  // null = creating, otherwise the entry id

      // A sensible "now-ish" default date label. The bundle can't read a reliable
      // wall-clock, so we seed from the browser Date (best effort) and let the user
      // edit it freely — the server only format-checks the string.
      function defaultDate() {
        const days = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
        const mons = ["Jan", "Feb", "Mar", "Apr", "May", "Jun",
                      "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        const d = new Date();
        const dd = String(d.getDate()).padStart(2, "0");
        return `${days[d.getDay()]} · ${mons[d.getMonth()]} ${dd}`;
      }
      function defaultTime() {
        const d = new Date();
        return `${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}`;
      }

      function openModal() {
        $err.textContent = "";
        $scrim.classList.add("open");
        $fTitle.focus();
      }
      function closeModal() {
        $scrim.classList.remove("open");
        editingId = null;
      }

      function openNew() {
        editingId = null;
        $modalTitle.textContent = "New entry";
        $fTitle.value = "";
        $fBody.value = "";
        $fMood.value = "good";
        $fDate.value = defaultDate();
        $fTime.value = defaultTime();
        $fDelete.hidden = true;
        openModal();
      }

      function openEdit(id) {
        const e = byId.get(id);
        if (!e) return;
        editingId = id;
        $modalTitle.textContent = "Edit entry";
        $fTitle.value = e.title;
        $fBody.value = e.body;
        $fMood.value = MOODS.includes(e.mood) ? e.mood : "good";
        $fDate.value = e.date;
        $fTime.value = e.time;
        $fDelete.hidden = false;
        openModal();
      }

      async function save() {
        $err.textContent = "";
        const payload = {
          title: $fTitle.value,
          body: $fBody.value,
          mood: $fMood.value,
          date: $fDate.value,
          time: $fTime.value,
        };
        if (!payload.title.trim() && !payload.body.trim()) {
          $err.textContent = "Add a title or some text before saving.";
          return;
        }
        const url = editingId == null ? "/api/entries" : "/api/entries/" + editingId;
        const method = editingId == null ? "POST" : "PUT";
        const res = await fetch(url, {
          method,
          headers: { "content-type": "application/json" },
          body: JSON.stringify(payload),
        });
        if (!res.ok) {
          let msg = "Could not save the entry.";
          try {
            const data = await res.json();
            if (typeof data.detail === "string") msg = data.detail;
            else if (Array.isArray(data.detail) && data.detail[0]?.msg) msg = data.detail[0].msg;
          } catch (_) {}
          $err.textContent = msg;
          return;
        }
        closeModal();
        await load($q.value);  // re-fetch so the FTS index / counts reflect the change
      }

      async function removeEntry(id) {
        const e = byId.get(id);
        const label = e && e.title ? `“${e.title}”` : "this entry";
        if (!confirm(`Delete ${label}? This cannot be undone.`)) return;
        const res = await fetch("/api/entries/" + id, { method: "DELETE" });
        if (res.ok) {
          if (editingId === id) closeModal();
          await load($q.value);
        }
      }

      document.getElementById("new-btn").addEventListener("click", openNew);
      document.getElementById("f-cancel").addEventListener("click", closeModal);
      $fDelete.addEventListener("click", () => { if (editingId != null) removeEntry(editingId); });
      $modal.addEventListener("submit", (ev) => { ev.preventDefault(); save(); });
      $scrim.addEventListener("click", (ev) => { if (ev.target === $scrim) closeModal(); });
      document.addEventListener("keydown", (ev) => {
        if (ev.key === "Escape" && $scrim.classList.contains("open")) closeModal();
      });

      load("");
    </script>
  </body>
</html>
